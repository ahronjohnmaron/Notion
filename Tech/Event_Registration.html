<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .emoji-icon {
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Segoe UI Symbol", "Android Emoji", "EmojiSymbols";
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
        .notion-link {
            text-decoration: underline;
            text-decoration-thickness: 0.05em;
            text-decoration-color: rgba(55, 53, 47, 0.4);
            text-underline-offset: 2px;
            opacity: 0.7;
            transition: opacity 0.2s ease, text-decoration-color 0.2s ease;
        }
        .notion-link:hover {
            opacity: 1;
            text-decoration-color: rgba(55, 53, 47, 0.8);
        }
    </style>
</head>
<body class="bg-white text-[#37352f] font-sans antialiased pb-32 relative selection:bg-[#cce2ff] selection:text-[#37352f]">

    <div class="absolute top-4 left-4 md:top-6 md:left-6 z-50">
        <button onclick="history.back()" class="flex items-center text-[15px] text-gray-800 bg-white/70 hover:bg-white backdrop-blur-md px-3 py-1.5 rounded-md shadow-sm transition-all group font-medium border border-white/20">
            <svg class="w-4 h-4 mr-1 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back
        </button>
    </div>

    <main class="max-w-[900px] w-full mx-auto px-6 md:px-12 lg:px-24 mt-24 flex flex-col gap-6">

        <div class="flex flex-col items-start gap-6">
            <div class="flex flex-col relative">
                <div class="mb-4 flex">
                    <span class="text-[78px] leading-none emoji-icon drop-shadow-sm select-none">🎟️</span>
                </div>
                <h1 class="text-[40px] font-bold leading-[1.2] tracking-tight text-[#37352f]">Event Registration</h1>
            </div>
        </div>

        <div class="w-full max-w-[770px] text-[16px] leading-[1.5] text-[#37352f] mt-2 flex flex-col gap-[12px]">

            </div>
    </main>
</body>
</html>
